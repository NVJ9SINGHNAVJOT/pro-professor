---
version: "3"

interval: 500ms

tasks:
  default:
    desc: List all tasks.
    cmd: task -l

  server:
    desc: Start Spring Boot central server (port 4000)
    cmds:
      - cd backend/central-server && ./mvnw spring-boot:run

  client:
    desc: Start Vite frontend dev server (port 5173)
    cmds:
      - cd frontend && npm run dev
